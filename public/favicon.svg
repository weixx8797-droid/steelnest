<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- SteelNest Favicon -->
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436"/>
      <stop offset="100%" style="stop-color:#636E72"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal nest -->
  <polygon points="16,2 28,8 28,20 16,26 4,20 4,8"
           fill="#2D3436" stroke="#1a1f20" stroke-width="0.5"
           stroke-linejoin="round" />

  <!-- Inner lines -->
  <line x1="4" y1="8" x2="28" y2="20" stroke="#636E72" stroke-width="0.8" opacity="0.6"/>
  <line x1="28" y1="8" x2="4" y2="20" stroke="#636E72" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="2" x2="16" y2="26" stroke="#636E72" stroke-width="0.8" opacity="0.6"/>

  <!-- Leaf -->
  <ellipse cx="13" cy="12" rx="3" ry="5" transform="rotate(-30, 13, 12)"
           fill="#4A7C59" opacity="0.9"/>
  <ellipse cx="19" cy="12" rx="3" ry="5" transform="rotate(30, 19, 12)"
           fill="#5B8C6A" opacity="0.9"/>

  <!-- Copper dot -->
  <circle cx="16" cy="14" r="1.5" fill="#C9A96E"/>
</svg>
