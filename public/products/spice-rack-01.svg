<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#FAFBFB"/>
  <g transform="translate(60, 50)">
    <!-- Two-tier stepped rack -->
    <!-- Lower tier -->
    <rect x="10" y="180" width="280" height="10" rx="2" fill="#2D3436"/>
    <rect x="10" y="120" width="280" height="10" rx="2" fill="#2D3436"/>
    <!-- Side frames -->
    <rect x="10" y="120" width="8" height="70" rx="2" fill="#636E72"/>
    <rect x="282" y="120" width="8" height="70" rx="2" fill="#636E72"/>
    <!-- Back step -->
    <rect x="10" y="60" width="280" height="10" rx="2" fill="#2D3436"/>
    <rect x="10" y="0" width="8" height="70" rx="2" fill="#636E72"/>
    <rect x="282" y="0" width="8" height="70" rx="2" fill="#636E72"/>
    <!-- Jars/spices on shelves -->
    <rect x="40" y="145" width="18" height="30" rx="5" fill="#C9A96E" opacity="0.6"/>
    <rect x="80" y="150" width="14" height="25" rx="4" fill="#4A7C59" opacity="0.5"/>
    <rect x="120" y="145" width="18" height="30" rx="5" fill="#636E72" opacity="0.5"/>
    <rect x="180" y="150" width="14" height="25" rx="4" fill="#C9A96E" opacity="0.6"/>
  </g>
  <text x="200" y="380" text-anchor="middle" fill="#B0B5B7" font-size="11" font-family="sans-serif">SteelNest · Product Photo</text>
</svg>
