<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#FAFBFB"/>
  <g transform="translate(40, 40)">
    <!-- 3 cubes in different configurations -->
    <polygon points="60,50 120,20 240,20 180,50" fill="#E8E8E8" stroke="#2D3436" stroke-width="1.5"/>
    <polygon points="60,50 60,150 120,180 120,80" fill="#D8D8D8" stroke="#2D3436" stroke-width="1.5"/>
    <polygon points="180,50 180,150 120,180 120,80" fill="#D0D0D0" stroke="#2D3436" stroke-width="1.5"/>
    <!-- Cube below -->
    <polygon points="60,150 120,120 240,120 180,150" fill="#E8E8E8" stroke="#2D3436" stroke-width="1.5"/>
    <polygon points="180,150 180,250 120,280 120,180" fill="#D0D0D0" stroke="#2D3436" stroke-width="1.5"/>
    <!-- Copper connectors -->
    <circle cx="120" cy="165" r="4" fill="#C9A96E"/>
    <circle cx="180" cy="165" r="4" fill="#C9A96E"/>
  </g>
  <text x="200" y="380" text-anchor="middle" fill="#B0B5B7" font-size="11" font-family="sans-serif">SteelNest · Product Photo</text>
</svg>
