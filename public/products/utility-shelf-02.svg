<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#FAFBFB"/>
  <g transform="translate(40, 25)">
    <!-- Angled 3D-ish view -->
    <polygon points="40,30 100,10 280,10 220,30" fill="#F0F2F2" stroke="#2D3436" stroke-width="1.2"/>
    <polygon points="40,30 40,130 100,150 100,50" fill="#E8E8E8" stroke="#2D3436" stroke-width="1.2"/>
    <polygon points="220,30 220,130 100,150 100,50" fill="#E0E0E0" stroke="#2D3436" stroke-width="1.2"/>
    <!-- Post -->
    <rect x="90" y="10" width="12" height="360" rx="2" fill="#636E72"/>
    <rect x="220" y="10" width="12" height="360" rx="2" fill="#636E72"/>
    <!-- More shelves -->
    <rect x="35" y="110" width="190" height="10" rx="2" fill="#2D3436"/>
    <rect x="35" y="210" width="190" height="10" rx="2" fill="#2D3436"/>
    <rect x="35" y="310" width="190" height="10" rx="2" fill="#2D3436"/>
  </g>
  <text x="200" y="390" text-anchor="middle" fill="#B0B5B7" font-size="11" font-family="sans-serif">SteelNest · Product Photo</text>
</svg>
