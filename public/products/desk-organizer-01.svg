<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Desktop Multi-Layer Organizer -->
  <rect width="400" height="400" fill="#FAFBFB"/>
  <g transform="translate(60, 40)">
    <!-- Shelf tiers -->
    <rect x="20" y="220" width="240" height="12" rx="2" fill="#2D3436"/>
    <rect x="20" y="130" width="240" height="12" rx="2" fill="#2D3436"/>
    <rect x="20" y="40" width="240" height="12" rx="2" fill="#2D3436"/>
    <!-- Side supports -->
    <rect x="20" y="40" width="8" height="192" rx="2" fill="#636E72"/>
    <rect x="252" y="40" width="8" height="192" rx="2" fill="#636E72"/>
    <!-- Items on shelves -->
    <rect x="180" y="155" width="30" height="40" rx="3" fill="#C9A96E" opacity="0.6"/>
    <rect x="140" y="160" width="25" height="35" rx="3" fill="#4A7C59" opacity="0.5"/>
    <rect x="60" y="245" width="45" height="30" rx="3" fill="#636E72" opacity="0.4"/>
    <circle cx="220" cy="260" r="15" fill="#C9A96E" opacity="0.5"/>
  </g>
  <text x="200" y="380" text-anchor="middle" fill="#B0B5B7" font-size="11" font-family="sans-serif">SteelNest · Product Photo</text>
</svg>
