    <rect x="20" y="160" width="180" height="8" rx="2" fill="#2D3436"/>
    <rect x="20" y="70" width="180" height="8" rx="2" fill="#2D3436"/>
    <!-- Jars with copper lids -->
    <rect x="60" y="80" width="20" height="35" rx="4" fill="#4A7C59" opacity="0.5"/>
    <rect x="60" y="76" width="20" height="8" rx="2" fill="#C9A96E"/>
    <rect x="120" y="85" width="16" height="28" rx="4" fill="#636E72" opacity="0.4"/>
