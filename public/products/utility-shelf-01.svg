<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#FAFBFB"/>
  <g transform="translate(50, 20)">
    <!-- 4-tier utility shelf -->
    <!-- Vertical posts -->
    <rect x="0" y="20" width="10" height="340" rx="2" fill="#636E72"/>
    <rect x="290" y="20" width="10" height="340" rx="2" fill="#636E72"/>
    <!-- Shelves (4 tiers) -->
    <rect x="10" y="280" width="280" height="12" rx="2" fill="#2D3436"/>
    <rect x="10" y="200" width="280" height="12" rx="2" fill="#2D3436"/>
    <rect x="10" y="120" width="280" height="12" rx="2" fill="#2D3436"/>
    <rect x="10" y="40" width="280" height="12" rx="2" fill="#2D3436"/>
    <!-- Items on shelves -->
    <rect x="60" y="240" width="50" height="35" rx="3" fill="#4A7C59" opacity="0.4"/>
    <rect x="180" y="230" width="40" height="45" rx="3" fill="#C9A96E" opacity="0.4"/>
    <circle cx="130" cy="165" r="18" fill="#636E72" opacity="0.3"/>
    <rect x="200" y="155" width="35" height="40" rx="3" fill="#4A7C59" opacity="0.3"/>
  </g>
  <text x="200" y="390" text-anchor="middle" fill="#B0B5B7" font-size="11" font-family="sans-serif">SteelNest · Product Photo</text>
</svg>
